name: workout_tracker_3ash
description: "3ash — high-end workout tracking with offline-first sync and smart progression."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.13.0-5.0.dev

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5

  # Local storage (offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3

  # Navigation
  go_router: ^15.1.2

  # Device & platform
  local_auth: ^2.3.0
  speech_to_text: ^7.0.0
  camera: ^0.11.1
  geolocator: ^13.0.4
  flutter_local_notifications: ^19.0.0
  connectivity_plus: ^6.1.4

  # Charts & utilities
  fl_chart: ^0.70.2
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
